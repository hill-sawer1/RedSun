name: a

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Install dep
      run: choco install mingw
      
    - name: Build
      run: g++ RedSun.cpp -o redsun
      
    - name: Artifact
      run: |
        mkdir artifacts
        cp redsun artifacts/
